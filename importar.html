<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Importando SPE...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:sans-serif;background:#2D0B5A;color:white;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;padding:20px;}
.spin{width:48px;height:48px;border:4px solid rgba(255,255,255,0.2);border-top-color:white;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
p{opacity:0.7;font-size:13px;text-align:center;}
</style>
</head>
<body>
<div class="spin"></div>
<h2>🚔 Importador SPE</h2>
<p id="msg">Carregando script...</p>
<script>
(function() {
    // Injeta o script na aba do SPE (opener) se disponível
    function injetar(win) {
        var s = win.document.createElement('script');
        s.src = 'https://micwoy193-alt.github.io/pmp-projeto-2/spe_importar.js?v=' + Date.now();
        s.crossOrigin = 'anonymous';
        win.document.head.appendChild(s);
    }

    var msg = document.getElementById('msg');

    // Tenta injetar no opener (aba do SPE que abriu esta janela)
    try {
        if (window.opener && window.opener.document && window.opener.location.href.indexOf('spe.bm.rs.gov.br') > -1) {
            injetar(window.opener);
            msg.textContent = '✅ Script injetado no SPE! Esta janela fechará em instantes...';
            setTimeout(function(){ window.close(); }, 2000);
            return;
        }
    } catch(e) {}

    // Se não conseguiu acessar o opener, executa aqui mesmo
    // (caso o usuário tenha aberto esta página diretamente)
    msg.textContent = '⚠️ Abra o SPE primeiro, depois clique no favorito estando na tela de Vítimas.';

    // Tenta executar aqui como fallback
    var s = document.createElement('script');
    s.src = 'https://micwoy193-alt.github.io/pmp-projeto-2/spe_importar.js?v=' + Date.now();
    s.crossOrigin = 'anonymous';
    document.head.appendChild(s);
})();
</script>
</body>
</html>
